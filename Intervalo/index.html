<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Intervalo</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f0f13;
      --surface: #1a1a22;
      --border: #2a2a38;
      --accent: #7c6aff;
      --accent-glow: rgba(124, 106, 255, 0.15);
      --text: #e8e8f0;
      --muted: #8888aa;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }

    a { color: var(--accent); text-decoration: none; }
    a:hover { text-decoration: underline; }

    .page-shell {
      max-width: 720px;
      width: 100%;
    }

    .topbar {
      display: flex;
      justify-content: flex-start;
      margin-bottom: 2rem;
    }

    .container {
      max-width: 560px;
      width: 100%;
      margin: 0 auto;
      text-align: center;
    }

    .back {
      display: inline-flex;
      align-items: center;
      gap: 0.35rem;
      color: var(--muted);
      font-size: 0.85rem;
      margin-bottom: 1rem;
    }

    .back:hover { color: var(--accent); text-decoration: none; }

    .logo {
      width: 108px;
      height: 108px;
      background: linear-gradient(180deg, #363636 0%, #242424 100%);
      border-radius: 24px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      margin-bottom: 1.5rem;
      box-shadow:
        0 20px 40px rgba(0, 0, 0, 0.35),
        inset 0 1px 0 rgba(255, 255, 255, 0.08);
    }

    .logo svg {
      width: 100%;
      height: 100%;
      display: block;
    }

    h1 {
      font-size: 1.75rem;
      font-weight: 700;
      letter-spacing: -0.02em;
      margin-bottom: 0.5rem;
    }

    .subtitle {
      color: var(--muted);
      font-size: 0.95rem;
      margin-bottom: 2.5rem;
    }

    .apps {
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
    }

    .app-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 1.25rem 1.5rem;
      text-decoration: none;
      color: var(--text);
      display: flex;
      align-items: center;
      justify-content: space-between;
      transition: border-color 0.2s, background 0.2s;
    }

    .app-card:hover {
      border-color: var(--accent);
      background: var(--accent-glow);
    }

    .app-info { text-align: left; }
    .app-name { font-weight: 600; font-size: 1rem; }
    .app-desc { color: var(--muted); font-size: 0.82rem; margin-top: 2px; }

    .arrow {
      color: var(--muted);
      font-size: 1.1rem;
      transition: color 0.2s;
    }

    .app-card:hover .arrow { color: var(--accent); }

    footer {
      margin-top: 3rem;
      color: var(--muted);
      font-size: 0.78rem;
    }
  </style>
</head>
<body>
  <div class="page-shell">
    <div class="topbar">
      <a class="back" href="../">← All Apps</a>
    </div>

    <div class="container">
      <div class="logo">
        <svg viewBox="0 0 120 120" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
          <defs>
            <radialGradient id="bgGlow" cx="50%" cy="45%" r="70%">
              <stop offset="0%" stop-color="#3a3a3a"/>
              <stop offset="100%" stop-color="#202020"/>
            </radialGradient>
            <linearGradient id="greenArc" x1="0%" y1="0%" x2="100%" y2="100%">
              <stop offset="0%" stop-color="#d4ff71"/>
              <stop offset="100%" stop-color="#9fe92a"/>
            </linearGradient>
            <linearGradient id="blueArc" x1="0%" y1="0%" x2="100%" y2="100%">
              <stop offset="0%" stop-color="#80b0ff"/>
              <stop offset="100%" stop-color="#2e63ea"/>
            </linearGradient>
            <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
              <feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="#000000" flood-opacity="0.4"/>
            </filter>
          </defs>

          <rect width="120" height="120" rx="24" fill="url(#bgGlow)"/>
          <circle cx="60" cy="60" r="44" fill="#292929"/>
          <circle cx="60" cy="60" r="47" fill="none" stroke="#1a1a1a" stroke-width="3"/>

          <circle
            cx="60"
            cy="60"
            r="44"
            fill="none"
            stroke="#424242"
            stroke-width="12"
            stroke-linecap="round"/>
          <circle
            cx="60"
            cy="60"
            r="44"
            fill="none"
            stroke="url(#greenArc)"
            stroke-width="12"
            stroke-linecap="round"
            stroke-dasharray="236 40"
            transform="rotate(-102 60 60)"
            filter="url(#shadow)"/>

          <circle
            cx="60"
            cy="60"
            r="31"
            fill="none"
            stroke="#3d3d3d"
            stroke-width="11"
            stroke-linecap="round"/>
          <circle
            cx="60"
            cy="60"
            r="31"
            fill="none"
            stroke="url(#blueArc)"
            stroke-width="11"
            stroke-linecap="round"
            stroke-dasharray="144 51"
            transform="rotate(-106 60 60)"
            filter="url(#shadow)"/>

          <text
            x="60"
            y="69"
            text-anchor="middle"
            font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', sans-serif"
            font-size="24"
            font-weight="500"
            fill="#f6f6f6"
            filter="url(#shadow)">00:45</text>
        </svg>
      </div>
      <h1>Intervalo</h1>
      <p class="subtitle">Privacy and support information for the Intervalo mobile application.</p>

      <div class="apps">
        <a class="app-card" href="./privacy/">
          <div class="app-info">
            <div class="app-name">Privacy Policy</div>
            <div class="app-desc">Read how Intervalo handles data.</div>
          </div>
          <span class="arrow">→</span>
        </a>

        <a class="app-card" href="./support/">
          <div class="app-info">
            <div class="app-name">Support</div>
            <div class="app-desc">Get help, contact details, and answers.</div>
          </div>
          <span class="arrow">→</span>
        </a>
      </div>

      <footer>© 2026 Patrycja Rychlik-Widera</footer>
    </div>
  </div>
</body>
</html>
