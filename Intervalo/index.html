<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Intervalo</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f0f13;
      --surface: #1a1a22;
      --border: #2a2a38;
      --accent: #7c6aff;
      --accent-glow: rgba(124, 106, 255, 0.15);
      --text: #e8e8f0;
      --muted: #8888aa;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI", sans-serif;
      font-size: 0.95rem;
      line-height: 1.7;
      padding: 2rem 1.25rem 4rem;
    }

    a { color: var(--accent); text-decoration: none; }
    a:hover { text-decoration: underline; }

    .page { max-width: 680px; margin: 0 auto; }

    .back {
      display: inline-flex;
      align-items: center;
      gap: 0.35rem;
      color: var(--muted);
      font-size: 0.85rem;
      margin-bottom: 1rem;
    }

    .back:hover { color: var(--accent); text-decoration: none; }

    .app-badge {
      display: inline-block;
      background: rgba(124, 106, 255, 0.12);
      border: 1px solid rgba(124, 106, 255, 0.3);
      border-radius: 8px;
      padding: 0.25rem 0.7rem;
      font-size: 0.72rem;
      font-weight: 600;
      color: var(--accent);
      letter-spacing: 0.05em;
      text-transform: uppercase;
      margin-bottom: 0.75rem;
    }

    h1 {
      font-size: 2rem;
      font-weight: 700;
      letter-spacing: -0.025em;
      margin-bottom: 0.5rem;
    }

    .intro {
      color: #b8b8d0;
      max-width: 560px;
      margin-bottom: 2rem;
    }

    .links {
      display: grid;
      gap: 0.9rem;
    }

    .card {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 1.25rem 1.4rem;
      transition: border-color 0.2s, background 0.2s;
    }

    .card:hover {
      border-color: var(--accent);
      background: var(--accent-glow);
      text-decoration: none;
    }

    .card-title {
      font-size: 1rem;
      font-weight: 700;
      color: var(--text);
    }

    .card-copy {
      color: var(--muted);
      font-size: 0.85rem;
      margin-top: 0.15rem;
    }

    .arrow {
      color: var(--muted);
      font-size: 1.1rem;
      flex-shrink: 0;
    }

    .card:hover .arrow { color: var(--accent); }

    .contact-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 1.2rem 1.4rem;
      margin-top: 1.4rem;
    }

    .contact-card p { color: #b8b8d0; }

    footer {
      margin-top: 3rem;
      padding-top: 1.5rem;
      border-top: 1px solid var(--border);
      color: var(--muted);
      font-size: 0.78rem;
      display: flex;
      justify-content: space-between;
      gap: 1rem;
      flex-wrap: wrap;
    }
  </style>
</head>
<body>
  <div class="page">
    <a class="back" href="../">← All Apps</a>
    <div class="app-badge">iOS App</div>
    <h1>Intervalo</h1>
    <p class="intro">Support and policy information for the Intervalo mobile application.</p>

    <div class="links">
      <a class="card" href="./Privacy/">
        <div>
          <div class="card-title">Privacy Policy</div>
          <div class="card-copy">Read how data is handled in Intervalo.</div>
        </div>
        <span class="arrow">→</span>
      </a>

      <a class="card" href="./Support/">
        <div>
          <div class="card-title">Support</div>
          <div class="card-copy">Get customer support and contact details.</div>
        </div>
        <span class="arrow">→</span>
      </a>
    </div>

    <div class="contact-card">
      <p>Contact: <a href="mailto:intervalo.app@gmail.com">intervalo.app@gmail.com</a></p>
    </div>

    <footer>
      <span>© 2026 Patrycja Rychlik-Widera</span>
      <span>Intervalo</span>
    </footer>
  </div>
</body>
</html>
